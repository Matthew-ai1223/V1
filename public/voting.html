<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Voting Ballot | Digital Election</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="ballot-container">
        <header style="text-align: center; margin-bottom: 3.5rem;">
            <div style="display: flex; justify-content: center; margin-bottom: 1rem;">
                <div style="background: #eef2ff; color: var(--primary); padding: 1rem; border-radius: 20px;">
                    <i data-lucide="vote" style="width: 40px; height: 40px;"></i>
                </div>
            </div>
            <h1 id="electionNameHeader" style="margin-bottom: 0.5rem; font-size: 2rem;">Secure Digital Ballot</h1>
            <div id="voterInfoBox" style="display: none; align-items: center; justify-content: center; gap: 8px; margin-bottom: 1rem; background: #f0fdf4; color: #166534; padding: 0.5rem 1rem; border-radius: 50px; width: fit-content; margin-left: auto; margin-right: auto; font-size: 0.875rem; font-weight: 600; border: 1px solid #dcfce7;">
                <i data-lucide="shield-check" style="width: 16px; height: 16px;"></i>
                <span id="voterInfo"></span>
            </div>
            <p style="max-width: 500px; margin: 0 auto; color: var(--text-muted);">Please carefully select one candidate for each category. Your selections are private, encrypted, and can only be submitted once.</p>
        </header>
        
        <div id="authSection" class="auth-card" style="display: none; max-width: 450px; margin: 0 auto; text-align: center; animation: fadeIn 0.5s ease-out; padding: 3rem; border-radius: 32px; background: white; border: 1px solid var(--border); box-shadow: var(--shadow);">
            <div style="background: #f8fafc; width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: var(--primary);">
                <i data-lucide="lock" style="width: 32px; height: 32px;"></i>
            </div>
            <h2 style="margin-bottom: 1rem;">Voter Verification</h2>
            <p style="margin-bottom: 2rem;">Please enter your registered email to access your secure digital ballot.</p>
            <form id="voterAuthForm" class="stacked-form">
                <div class="input-group">
                    <input type="email" id="authEmail" placeholder="your-email@example.com" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Access Ballot</button>
            </form>
        </div>

        <div id="ballotSection" style="display: none;">
            <div id="ballotCandidates" class="candidate-grid">
                <!-- Candidates will be loaded here -->
            </div>
        </div>
    </div>
    <script src="/js/utils.js"></script>
    <script src="/js/voting.js"></script>
</body>
</html>
