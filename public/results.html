<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Election Results</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="results-container">
        <header style="text-align: center; margin-bottom: 3rem;">
            <h2>Live Election Results</h2>
            <p>Real-time analytics and voting statistics.</p>
        <div class="stats-row" style="margin-bottom: 4rem;">
            <div class="stat-card">
                <h3>Total Turnout</h3>
                <p id="turnoutPercent">0%</p>
                <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px;">
                    <span id="votedCount">0</span> of <span id="totalCount">0</span> Voters
                </div>
            </div>
            <div class="stat-card">
                <h3>Election Status</h3>
                <p style="font-size: 1.25rem; color: var(--success);" id="electionStatus">LIVE</p>
            </div>
        </div>

        <div id="resultsGrid">
            <!-- Results will be loaded here -->
        </div>
        <footer style="margin-top: 3rem; text-align: center; border-top: 1px solid var(--border); padding-top: 1.5rem;">
            <p>System automatically updates as votes are cast.</p>
        </footer>
    </div>
    <script src="/js/utils.js"></script>
    <script src="/js/results.js"></script>
</body>
</html>
