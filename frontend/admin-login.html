<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Secure Voting</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="form-container">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2>Admin Portal</h2>
            <p>Enter your credentials to manage the election.</p>
        </div>
        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="admin@example.com" required>
            </div>
            <div class="input-group">
                <label>Security Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Authenticate</button>
        </form>
        <p id="errorMsg" class="error" style="margin-top: 1rem;"></p>
    </div>
    <script src="/js/utils.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
