<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Election Results</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="results-container">
        <header style="text-align: center; margin-bottom: 3rem;">
            <h2>Live Election Results</h2>
            <p>Real-time analytics and voting statistics.</p>
        </header>
        <div id="resultsGrid" class="candidate-grid">
            <!-- Results will be loaded here -->
        </div>
        <footer style="margin-top: 3rem; text-align: center; border-top: 1px solid var(--border); padding-top: 1.5rem;">
            <p>System automatically updates as votes are cast.</p>
        </footer>
    </div>
    <script src="js/utils.js"></script>
    <script src="js/results.js"></script>
</body>
</html>
